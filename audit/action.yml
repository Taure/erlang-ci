name: 'Erlang Audit'
description: 'Run rebar3 audit to check dependencies for known vulnerabilities'
author: 'novaframework'

inputs:
  level:
    description: 'Minimum severity to fail on (critical, high, medium, low)'
    required: false
    default: 'low'
  ignores:
    description: 'Whitespace- or comma-separated GHSA IDs to skip (e.g. "GHSA-xxxx-yyyy-zzzz GHSA-aaaa-bbbb-cccc"). Use for advisories that have no upstream patch and do not apply to this project. Document each entry in SECURITY.md or an audit doc.'
    required: false
    default: ''

outputs:
  json:
    description: 'JSON audit result {vulnerabilities: [...], dependencies_scanned: N}'
    value: ${{ steps.audit.outputs.json }}

runs:
  using: 'composite'
  steps:
    - name: Run audit
      id: audit
      shell: bash
      env:
        AUDIT_LEVEL: ${{ inputs.level }}
        AUDIT_IGNORES: ${{ inputs.ignores }}
      run: |
        ignore_args=()
        if [ -n "$AUDIT_IGNORES" ]; then
          for ghsa in $(echo "$AUDIT_IGNORES" | tr ',' ' '); do
            ignore_args+=(-i "$ghsa")
          done
        fi
        set +e
        timeout "${AUDIT_TIMEOUT:-300}" rebar3 audit --level "$AUDIT_LEVEL" "${ignore_args[@]}"
        status=$?
        set -e
        if [ "$status" -eq 124 ]; then
          echo "::error::rebar3 audit timed out after ${AUDIT_TIMEOUT:-300}s - the advisory database is likely unreachable. Failing closed; re-run once the source recovers." >&2
          exit 1
        fi
        exit "$status"
