name: Erlang CI

permissions:
  contents: read

on:
  workflow_call:
    secrets:
      ssh-key:
        description: 'SSH private key for accessing private dependencies'
        required: false
      hex-api-key:
        description: 'Hex.pm API key for accessing private packages'
        required: false
    inputs:
      otp-version:
        description: 'Erlang/OTP version (e.g. "28.0"). Ignored if version-file is set.'
        type: string
        required: false
        default: '28'
      rebar3-version:
        description: 'Rebar3 version'
        type: string
        required: false
        default: '3'
      version-file:
        description: 'Read versions from file (.tool-versions or mise.toml)'
        type: string
        required: false
        default: ''
      version-type:
        description: 'Version match type (strict or loose). Defaults to strict when version-file is set.'
        type: string
        required: false
        default: ''
      otp-matrix:
        description: 'JSON array of OTP versions for matrix testing (e.g. ''["27","28"]''). Tests run on all, dialyzer on latest only.'
        type: string
        required: false
        default: ''

      # Steps to enable/disable
      enable-fmt:
        description: 'Run rebar3 fmt --check'
        type: boolean
        required: false
        default: true
      enable-xref:
        description: 'Run rebar3 xref'
        type: boolean
        required: false
        default: true
      enable-dialyzer:
        description: 'Run rebar3 dialyzer'
        type: boolean
        required: false
        default: true
      enable-eunit:
        description: 'Run rebar3 eunit'
        type: boolean
        required: false
        default: true
      enable-ct:
        description: 'Run rebar3 ct'
        type: boolean
        required: false
        default: false
      enable-lint:
        description: 'Run rebar3 lint (requires rebar3_lint plugin)'
        type: boolean
        required: false
        default: false
      enable-hank:
        description: 'Run rebar3 hank (requires rebar3_hank plugin)'
        type: boolean
        required: false
        default: false
      enable-sheldon:
        description: 'Run rebar3 spellcheck (requires rebar3_sheldon plugin)'
        type: boolean
        required: false
        default: false
      enable-ex-doc:
        description: 'Run rebar3 ex_doc'
        type: boolean
        required: false
        default: false
      enable-audit:
        description: 'Run rebar3 audit (requires rebar3_audit plugin)'
        type: boolean
        required: false
        default: false
      audit-level:
        description: 'Minimum severity to fail on (critical, high, medium, low)'
        type: string
        required: false
        default: 'low'
      enable-coverage:
        description: 'Enable code coverage (--cover flag + covertool)'
        type: boolean
        required: false
        default: false
      enable-sbom:
        description: 'Generate CycloneDX SBOM (requires rebar3_sbom plugin)'
        type: boolean
        required: false
        default: false
      enable-sbom-scan:
        description: 'Scan SBOM for vulnerabilities using Trivy (requires enable-sbom)'
        type: boolean
        required: false
        default: false
      enable-dependency-submission:
        description: 'Submit dependencies to GitHub Dependency Graph'
        type: boolean
        required: false
        default: false
      enable-mutate:
        description: 'Run mutation testing (requires rebar3_mutate plugin)'
        type: boolean
        required: false
        default: false
      mutate-min-score:
        description: 'Minimum mutation score (0-100), fail if below'
        type: string
        required: false
        default: ''
      mutate-test-framework:
        description: 'Test framework for mutation testing (eunit or ct)'
        type: string
        required: false
        default: 'eunit'
      mutate-diff:
        description: 'Only mutate lines changed in PR (requires rebar3_mutate >= 0.4.0)'
        type: boolean
        required: false
        default: false
      mutate-args:
        description: 'Extra args for rebar3 mutate'
        type: string
        required: false
        default: ''

      # ELP (Erlang Language Platform)
      enable-elp-lint:
        description: 'Run ELP lint checks'
        type: boolean
        required: false
        default: false
      enable-elp-eqwalize:
        description: 'Run ELP eqwalize-all type checking'
        type: boolean
        required: false
        default: false
      elp-version:
        description: 'ELP release tag (e.g. "2026-02-27")'
        type: string
        required: false
        default: '2026-02-27'

      # Summary
      enable-summary:
        description: 'Post a status summary comment on PRs'
        type: boolean
        required: false
        default: true

      # Extra
      ct-config:
        description: 'Path to CT sys.config file (passed as --sys_config)'
        type: string
        required: false
        default: ''
      rebar3-compile-args:
        description: 'Extra args for rebar3 compile'
        type: string
        required: false
        default: ''
      eunit-args:
        description: 'Extra args for rebar3 eunit (e.g. --module=foo_tests,bar_tests)'
        type: string
        required: false
        default: ''
      ct-args:
        description: 'Extra args for rebar3 ct'
        type: string
        required: false
        default: ''
      pre-test-command:
        description: 'Shell command to run before tests (e.g., DB migrations, topic creation)'
        type: string
        required: false
        default: ''
      extra-services-compose:
        description: 'Path to docker-compose.yml for additional services'
        type: string
        required: false
        default: ''

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        id: setup
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
          ssh-key: ${{ secrets.ssh-key }}
      - name: Clean project app
        run: rebar3 clean -a
      - name: Compile
        env:
          COMPILE_ARGS: ${{ inputs.rebar3-compile-args }}
        run: rebar3 compile $COMPILE_ARGS
      - name: Check for uncommitted artifacts
        run: git diff --exit-code

  prepare-checks:
    name: Prepare checks
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
      has-checks: ${{ steps.matrix.outputs.has-checks }}
    steps:
      - id: matrix
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const checks = [];
            const inputs = ${{ toJSON(inputs) }};
            const isPR = '${{ github.event_name }}' === 'pull_request';
            const isPush = '${{ github.event_name }}' === 'push';

            // PR-only checks (already validated before merge)
            const prOnly = [
              { name: 'Format',        command: 'fmt --check',  key: 'enable-fmt' },
              { name: 'Xref',          command: 'xref',         key: 'enable-xref' },
              { name: 'Lint',          command: 'lint',         key: 'enable-lint' },
              { name: 'Hank',          command: 'hank',         key: 'enable-hank' },
              { name: 'Sheldon',       command: 'spellcheck',   key: 'enable-sheldon' },
            ];

            // Main-only checks (artifacts, publish)
            const mainOnly = [
              { name: 'Documentation', command: 'ex_doc',       key: 'enable-ex-doc' },
            ];

            for (const c of prOnly) {
              if (inputs[c.key] && isPR) checks.push(c);
            }
            for (const c of mainOnly) {
              if (inputs[c.key] && isPush) checks.push(c);
            }
            core.setOutput('has-checks', checks.length > 0 ? 'true' : 'false');
            return checks;

  checks:
    name: ${{ matrix.name }}
    needs: [compile, prepare-checks]
    if: ${{ needs.prepare-checks.outputs.has-checks == 'true' }}
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-checks.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
          ssh-key: ${{ secrets.ssh-key }}
      - run: rebar3 ${{ matrix.command }}

  dialyzer:
    name: Dialyzer
    needs: compile
    if: ${{ inputs.enable-dialyzer && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
          ssh-key: ${{ secrets.ssh-key }}
      - uses: Taure/erlang-ci/dialyzer@main
        with:
          otp-version: ${{ inputs.otp-version }}

  elp-lint:
    name: ELP Lint
    needs: compile
    if: ${{ inputs.enable-elp-lint && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    outputs:
      json: ${{ steps.elp.outputs.lint-json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
          ssh-key: ${{ secrets.ssh-key }}
      - uses: Taure/erlang-ci/elp@main
        id: elp
        with:
          version: ${{ inputs.elp-version }}
          mode: lint

  elp-eqwalize:
    name: ELP eqWAlize
    needs: compile
    if: ${{ inputs.enable-elp-eqwalize && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    outputs:
      json: ${{ steps.elp.outputs.eqwalize-json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
          ssh-key: ${{ secrets.ssh-key }}
      - uses: Taure/erlang-ci/elp@main
        id: elp
        with:
          version: ${{ inputs.elp-version }}
          mode: eqwalize

  audit:
    name: Audit
    needs: compile
    if: ${{ inputs.enable-audit }}
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    outputs:
      json: ${{ steps.audit.outputs.json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
          ssh-key: ${{ secrets.ssh-key }}
      - uses: Taure/erlang-ci/audit@main
        id: audit
        with:
          level: ${{ inputs.audit-level }}

  eunit:
    name: EUnit${{ matrix.otp && format(' (OTP {0})', matrix.otp) || '' }}
    needs: compile
    if: ${{ inputs.enable-eunit }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        otp: ${{ fromJSON(inputs.otp-matrix || format('["{0}"]', inputs.otp-version)) }}
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ inputs.rebar3-version }}
          ssh-key: ${{ secrets.ssh-key }}
      - name: Start extra services
        if: ${{ inputs.extra-services-compose != '' }}
        env:
          COMPOSE_FILE: ${{ inputs.extra-services-compose }}
        run: docker compose -f "$COMPOSE_FILE" up -d --wait
      - name: Pre-test setup
        if: ${{ inputs.pre-test-command != '' }}
        env:
          PRE_TEST_COMMAND: ${{ inputs.pre-test-command }}
        run: eval "$PRE_TEST_COMMAND"
      - name: EUnit
        env:
          EUNIT_ARGS: ${{ inputs.eunit-args }}
          COVER_FLAG: ${{ inputs.enable-coverage && github.event_name == 'pull_request' && '--cover' || '' }}
        run: rebar3 eunit $EUNIT_ARGS $COVER_FLAG
      - name: Upload coverdata
        if: ${{ inputs.enable-coverage && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverdata-eunit-otp${{ matrix.otp }}
          path: _build/test/cover/eunit.coverdata

  ct:
    name: Common Test${{ matrix.otp && format(' (OTP {0})', matrix.otp) || '' }}
    needs: compile
    if: ${{ inputs.enable-ct }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        otp: ${{ fromJSON(inputs.otp-matrix || format('["{0}"]', inputs.otp-version)) }}
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ inputs.rebar3-version }}
          ssh-key: ${{ secrets.ssh-key }}
      - name: Start extra services
        if: ${{ inputs.extra-services-compose != '' }}
        env:
          COMPOSE_FILE: ${{ inputs.extra-services-compose }}
        run: docker compose -f "$COMPOSE_FILE" up -d --wait
      - name: Pre-test setup
        if: ${{ inputs.pre-test-command != '' }}
        env:
          PRE_TEST_COMMAND: ${{ inputs.pre-test-command }}
        run: eval "$PRE_TEST_COMMAND"
      - name: Common Test
        env:
          CT_ARGS: ${{ inputs.ct-args }}
          CT_CONFIG: ${{ inputs.ct-config && format('--sys_config {0}', inputs.ct-config) || '' }}
          COVER_FLAG: ${{ inputs.enable-coverage && github.event_name == 'pull_request' && '--cover' || '' }}
        run: rebar3 ct $CT_ARGS $CT_CONFIG $COVER_FLAG
      - name: Upload coverdata
        if: ${{ inputs.enable-coverage && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverdata-ct-otp${{ matrix.otp }}
          path: _build/test/cover/ct.coverdata

  coverage:
    name: Coverage
    needs: [eunit, ct]
    if: ${{ always() && inputs.enable-coverage && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    outputs:
      json: ${{ steps.extract.outputs.json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
          ssh-key: ${{ secrets.ssh-key }}
      - name: Download coverdata artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverdata-*
          merge-multiple: true
          path: _build/test/cover
      - name: Compile and generate coverage report
        run: |
          rebar3 as test compile
          echo "Coverdata files:"
          ls -la _build/test/cover/*.coverdata 2>/dev/null || echo "No coverdata files found"
          rebar3 covertool generate
      - name: Extract coverage summary
        id: extract
        run: |
          total_covered=0
          total_valid=0
          while IFS= read -r f; do
            covered=$(grep -o 'lines-covered="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
            valid=$(grep -o 'lines-valid="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
            echo "  $f: covered=$covered valid=$valid"
            total_covered=$((total_covered + ${covered:-0}))
            total_valid=$((total_valid + ${valid:-0}))
          done < <(find _build/test/covertool -name '*.covertool.xml' 2>/dev/null)

          if [ "$total_valid" -gt 0 ]; then
            pct=$(awk "BEGIN {printf \"%.1f\", ($total_covered/$total_valid)*100}")
          else
            pct="0.0"
          fi

          echo "json<<COV_EOF" >> "$GITHUB_OUTPUT"
          echo "{\"line_rate\":$pct,\"lines_covered\":$total_covered,\"lines_valid\":$total_valid}" >> "$GITHUB_OUTPUT"
          echo "COV_EOF" >> "$GITHUB_OUTPUT"
          echo "Coverage: $pct% ($total_covered/$total_valid lines)"

  sbom:
    name: SBOM
    needs: compile
    if: ${{ inputs.enable-sbom }}
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    outputs:
      scan-json: ${{ steps.sbom.outputs.scan-json }}
      ignored-json: ${{ steps.sbom.outputs.ignored-json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
          ssh-key: ${{ secrets.ssh-key }}
      - uses: Taure/erlang-ci/sbom@main
        id: sbom
        with:
          scan: ${{ inputs.enable-sbom-scan && 'true' || 'false' }}
          github-token: ${{ github.token }}
          upload: ${{ github.event_name == 'push' && 'true' || 'false' }}

  dependency-submission:
    name: Dependency Submission
    needs: compile
    if: ${{ inputs.enable-dependency-submission && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: erlef/rebar3-dependency-submission@c1870bc7ba79a756cb0bc9749256685e612b737c # main

  mutate:
    name: Mutation Testing
    needs: compile
    if: ${{ inputs.enable-mutate && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    outputs:
      json: ${{ steps.mutate.outputs.json }}
    env:
      HEX_API_KEY: ${{ secrets.hex-api-key }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: Taure/erlang-ci@main
        with:
          otp-version: ${{ inputs.otp-version }}
          rebar3-version: ${{ inputs.rebar3-version }}
          version-file: ${{ inputs.version-file }}
          version-type: ${{ inputs.version-type }}
          ssh-key: ${{ secrets.ssh-key }}
      - name: Start extra services
        if: ${{ inputs.extra-services-compose != '' }}
        env:
          COMPOSE_FILE: ${{ inputs.extra-services-compose }}
        run: docker compose -f "$COMPOSE_FILE" up -d --wait
      - name: Pre-test setup
        if: ${{ inputs.pre-test-command != '' }}
        env:
          PRE_TEST_COMMAND: ${{ inputs.pre-test-command }}
        run: eval "$PRE_TEST_COMMAND"
      - uses: Taure/erlang-ci/mutate@main
        id: mutate
        with:
          min-score: ${{ inputs.mutate-min-score }}
          test-framework: ${{ inputs.mutate-test-framework }}
          diff: ${{ inputs.mutate-diff && 'true' || 'false' }}
          diff-base: ${{ inputs.mutate-diff && github.base_ref && format('origin/{0}', github.base_ref) || '' }}
          args: ${{ inputs.mutate-args }}

  summary:
    name: Summary
    if: ${{ always() && inputs.enable-summary && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    needs: [audit, sbom, coverage, mutate, elp-lint, elp-eqwalize]
    permissions:
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: Taure/erlang-ci
          ref: main
          sparse-checkout: scripts
          persist-credentials: false
      - name: Post summary comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          AUDIT_JSON: ${{ needs.audit.outputs.json }}
          SBOM_JSON: ${{ needs.sbom.outputs.scan-json }}
          IGNORED_JSON: ${{ needs.sbom.outputs.ignored-json }}
          COVERAGE_JSON: ${{ needs.coverage.outputs.json }}
          MUTATE_JSON: ${{ needs.mutate.outputs.json }}
          ELP_LINT_JSON: ${{ needs.elp-lint.outputs.json }}
          ELP_EQWALIZE_JSON: ${{ needs.elp-eqwalize.outputs.json }}
        with:
          script: |
            const { renderSummary } = require('./scripts/ci-summary');
            const body = renderSummary({
              audit: process.env.AUDIT_JSON,
              sbom: process.env.SBOM_JSON,
              ignored: process.env.IGNORED_JSON,
              coverage: process.env.COVERAGE_JSON,
              mutate: process.env.MUTATE_JSON,
              elpLint: process.env.ELP_LINT_JSON,
              elpEqwalize: process.env.ELP_EQWALIZE_JSON,
            });
            if (!body) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body && c.body.includes('<!-- erlang-ci-summary -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
